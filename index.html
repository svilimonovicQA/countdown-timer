<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🕐 Countdown Timer</h1>
        <p>Create countdowns for your important events</p>
      </header>

      <main>
        <!-- Event Input Form -->
        <section class="event-form-section">
          <h2>Create New Event</h2>
          <form id="eventForm" class="event-form">
            <div class="form-group">
              <label for="eventName">Event Name *</label>
              <input
                type="text"
                id="eventName"
                name="eventName"
                placeholder="Enter event name"
                required
              />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="eventDate">Event Date *</label>
                <input type="date" id="eventDate" name="eventDate" required />
              </div>

              <div class="form-group">
                <label for="eventTime">Event Time (optional)</label>
                <input type="time" id="eventTime" name="eventTime" />
              </div>
            </div>

            <button type="submit" class="start-btn">Start Countdown</button>
          </form>

          <!-- Warning Messages -->
          <div id="warningMessage" class="warning-message hidden"></div>
        </section>

        <!-- Active Countdowns -->
        <section class="countdowns-section">
          <h2>Active Countdowns</h2>
          <div id="countdownsContainer" class="countdowns-container">
            <div class="no-events">
              <p>No active countdowns. Create your first event above!</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Audio for notifications -->
    <audio id="notificationSound" preload="auto">
      <source
        src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqF..."
      />
    </audio>
    <script src="script.js"></script>
  </body>
</html>
